name: Quick Build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'gamepad-experimental'
        type: choice
        options:
          - master
          - gamepad-experimental
          - develop
      build_only:
        description: 'Build only (skip tests and analysis)'
        required: true
        default: true
        type: boolean
      architecture:
        description: 'Target architecture'
        required: true
        default: 'arm64-v8a'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86_64
          - all

jobs:
  quick-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch }}

    - name: Display build configuration
      run: |
        echo "⚡ Quick Build for Zomdroid"
        echo "📋 Configuration:"
        echo "  Branch: ${{ github.event.inputs.branch }}"
        echo "  Build Only: ${{ github.event.inputs.build_only }}"
        echo "  Architecture: ${{ github.event.inputs.architecture }}"
        echo "  Timestamp: $(date)"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK Components
      run: |
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;35.0.0"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;28.0.13004108"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-quick-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Clean project
      run: ./gradlew clean

    - name: Configure architecture filter
      if: ${{ github.event.inputs.architecture != 'all' }}
      run: |
        # Modify build.gradle.kts to filter specific architecture
        sed -i 's/abiFilters.add("arm64-v8a")/abiFilters.add("${{ github.event.inputs.architecture }}")/' app/build.gradle.kts
        echo "Architecture filter set to: ${{ github.event.inputs.architecture }}"

    - name: Quick syntax check
      if: ${{ github.event.inputs.build_only == 'false' }}
      run: |
        echo "🔍 Running quick syntax validation..."
        ./gradlew compileDebugJavaWithJavac --no-daemon

    - name: Build debug APK
      run: |
        echo "🔨 Building debug APK..."
        ./gradlew assembleDebug --no-daemon --parallel

    - name: Get build information
      id: build_info
      run: |
        APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
        if [ -n "$APK_PATH" ]; then
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          APK_NAME=$(basename "$APK_PATH")
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "✅ APK built successfully: $APK_NAME ($APK_SIZE)"
        else
          echo "❌ APK not found"
          exit 1
        fi

    - name: Quick test (if enabled)
      if: ${{ github.event.inputs.build_only == 'false' }}
      run: |
        echo "🧪 Running quick unit tests..."
        timeout 300 ./gradlew testDebugUnitTest --no-daemon || echo "Tests completed or timed out"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: zomdroid-quick-build-${{ github.event.inputs.branch }}-${{ github.event.inputs.architecture }}
        path: ${{ steps.build_info.outputs.apk_path }}
        retention-days: 7

    - name: Build summary
      run: |
        echo "## 🎉 Quick Build Completed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Configuration:**" >> $GITHUB_STEP_SUMMARY
        echo "- Branch: \`${{ github.event.inputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Architecture: \`${{ github.event.inputs.architecture }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Build Only: \`${{ github.event.inputs.build_only }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Result:**" >> $GITHUB_STEP_SUMMARY
        echo "- APK: \`${{ steps.build_info.outputs.apk_name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Size: \`${{ steps.build_info.outputs.apk_size }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Download: Available in Artifacts section" >> $GITHUB_STEP_SUMMARY

  validate-gamepad-features:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_only == 'false' }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch }}

    - name: Validate gamepad code structure
      run: |
        echo "🎮 Validating gamepad features..."
        
        # Check if gamepad files exist
        GAMEPAD_FILES=(
          "app/src/main/java/com/zomdroid/input/GamepadManager.java"
          "app/src/main/java/com/zomdroid/input/GamepadInputHandler.java"
          "app/src/main/java/com/zomdroid/input/InputNativeInterface.java"
        )
        
        for file in "${GAMEPAD_FILES[@]}"; do
          if [ -f "$file" ]; then
            echo "✅ Found: $file"
          else
            echo "❌ Missing: $file"
          fi
        done
        
        # Check for key gamepad functionality
        echo ""
        echo "🔍 Checking gamepad implementation..."
        grep -r "GAMEPAD_CONNECTED\|GAMEPAD_DISCONNECTED" app/src/main/cpp/ && echo "✅ C++ events found" || echo "❌ C++ events missing"
        grep -r "GamepadManager\|GamepadInputHandler" app/src/main/java/ && echo "✅ Java classes found" || echo "❌ Java classes missing"
        
        echo ""
        echo "Gamepad validation completed!"

    - name: Create validation report
      run: |
        echo "## 🎮 Gamepad Feature Validation" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** \`${{ github.event.inputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Files Status:**" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "app/src/main/java/com/zomdroid/input/GamepadManager.java" ]; then
          echo "- ✅ GamepadManager.java" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ GamepadManager.java" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ -f "app/src/main/java/com/zomdroid/input/GamepadInputHandler.java" ]; then
          echo "- ✅ GamepadInputHandler.java" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ GamepadInputHandler.java" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ -f "app/src/main/java/com/zomdroid/input/InputNativeInterface.java" ]; then
          echo "- ✅ InputNativeInterface.java" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ InputNativeInterface.java" >> $GITHUB_STEP_SUMMARY
        fi
