name: Android Build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'gamepad-experimental'
        type: choice
        options:
          - master
          - gamepad-experimental
          - develop
      build_type:
        description: 'Build configuration'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both
      run_tests:
        description: 'Run tests'
        required: true
        default: true
        type: boolean
      run_security_scan:
        description: 'Run security scan'
        required: true
        default: false
        type: boolean
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch || github.ref }}

    - name: Display build configuration
      run: |
        echo "🚀 Building Zomdroid"
        echo "📋 Configuration:"
        echo "  Branch: ${{ github.event.inputs.branch || github.ref_name }}"
        echo "  Build Type: ${{ github.event.inputs.build_type || 'debug' }}"
        echo "  Run Tests: ${{ github.event.inputs.run_tests || 'true' }}"
        echo "  Security Scan: ${{ github.event.inputs.run_security_scan || 'false' }}"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK Components
      run: |
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;35.0.0"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;28.0.13004108"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v2

    - name: Check code formatting (if applicable)
      run: ./gradlew spotlessCheck || true
      continue-on-error: true

    - name: Lint check
      run: ./gradlew lintDebug

    - name: Run unit tests
      if: ${{ github.event.inputs.run_tests == 'true' || github.event_name == 'pull_request' }}
      run: ./gradlew testDebugUnitTest

    - name: Build debug APK
      if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both' || github.event_name == 'pull_request' }}
      run: ./gradlew assembleDebug

    - name: Upload debug APK
      if: ${{ (github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both' || github.event_name == 'pull_request') && success() }}
      uses: actions/upload-artifact@v4
      with:
        name: zomdroid-debug-apk-${{ github.event.inputs.branch || github.ref_name }}
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Build release APK (unsigned)
      if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both' }}
      run: ./gradlew assembleRelease
      continue-on-error: true

    - name: Upload release APK (if built)
      if: ${{ (github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both') && success() }}
      uses: actions/upload-artifact@v4
      with:
        name: zomdroid-release-apk-${{ github.event.inputs.branch || github.ref_name }}
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30

  test:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.run_tests == 'true' || github.event_name == 'pull_request' }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch || github.ref }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK Components
      run: |
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;35.0.0"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "emulator"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "system-images;android-35;google_apis;x86_64"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Create AVD and run instrumented tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 35
        target: google_apis
        arch: x86_64
        ram-size: 2048M
        disk-size: 4096M
        script: ./gradlew connectedDebugAndroidTest

    - name: Upload test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: |
          app/build/reports/
          app/build/test-results/
        retention-days: 30

  static-analysis:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_tests == 'true' || github.event_name == 'pull_request' }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch || github.ref }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK Components
      run: |
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;35.0.0"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Run detekt (if configured)
      run: ./gradlew detekt || true
      continue-on-error: true

    - name: Generate lint report
      run: ./gradlew lintDebug

    - name: Upload lint results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-results
        path: app/build/reports/lint-results-debug.html
        retention-days: 30

  security-scan:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_security_scan == 'true' }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch || github.ref }}

    - name: Run Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      id: depcheck
      with:
        project: 'zomdroid'
        path: '.'
        format: 'ALL'
        args: >
          --enableRetired
          --enableExperimental
          --out /tmp/dependency-check-report

    - name: Upload dependency check results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-check-report
        path: /tmp/dependency-check-report
        retention-days: 30
