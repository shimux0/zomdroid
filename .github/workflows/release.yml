name: Release Build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build release from'
        required: true
        default: 'master'
        type: choice
        options:
          - master
          - gamepad-experimental
          - develop
      version:
        description: 'Release version (e.g. v1.2.1)'
        required: true
        default: 'v1.2.1'
      create_github_release:
        description: 'Create GitHub release'
        required: true
        default: true
        type: boolean
      sign_apk:
        description: 'Sign APK (requires keystore secrets)'
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch || github.ref }}

    - name: Display release configuration
      run: |
        echo "🚀 Building Zomdroid Release"
        echo "📋 Configuration:"
        echo "  Branch: ${{ github.event.inputs.branch || github.ref_name }}"
        echo "  Version: ${{ github.event.inputs.version || github.ref_name }}"
        echo "  Create Release: ${{ github.event.inputs.create_github_release || 'true' }}"
        echo "  Sign APK: ${{ github.event.inputs.sign_apk || 'false' }}"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK Components
      run: |
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;35.0.0"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;28.0.13004108"
        echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Decode Keystore
      if: ${{ (github.event.inputs.sign_apk == 'true' || github.event_name == 'push') && secrets.RELEASE_KEYSTORE_BASE64 != '' }}
      env:
        ENCODED_STRING: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      run: |
        mkdir -p app/keystore
        echo $ENCODED_STRING | base64 -d > app/keystore/release.keystore

    - name: Create local.properties
      if: ${{ (github.event.inputs.sign_apk == 'true' || github.event_name == 'push') && secrets.RELEASE_KEYSTORE_BASE64 != '' }}
      run: |
        echo "RELEASE_STORE_FILE=keystore/release.keystore" > local.properties
        echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> local.properties
        echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> local.properties
        echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> local.properties

    - name: Build signed release APK
      if: ${{ (github.event.inputs.sign_apk == 'true' || github.event_name == 'push') && secrets.RELEASE_KEYSTORE_BASE64 != '' }}
      run: ./gradlew assembleRelease

    - name: Build unsigned release APK (fallback)
      if: ${{ github.event.inputs.sign_apk != 'true' || secrets.RELEASE_KEYSTORE_BASE64 == '' }}
      run: ./gradlew assembleRelease

    - name: Get version name
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Create GitHub Release
      id: create_release
      if: ${{ github.event.inputs.create_github_release == 'true' || github.event_name == 'push' }}
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.version }}
        release_name: Zomdroid ${{ steps.version.outputs.version }}
        body: |
          ## Zomdroid ${{ steps.version.outputs.version }}
          
          **Built from branch:** ${{ github.event.inputs.branch || github.ref_name }}
          **Build type:** ${{ github.event.inputs.sign_apk == 'true' && 'Signed' || 'Unsigned' }}
          
          ### Features
          - Project Zomboid launcher for Android
          - Gamepad support with Xbox controller mapping
          - Virtual controller with dynamic visibility
          - Box64 emulation layer
          
          ### Installation
          1. Download the APK file below
          2. Enable "Install from unknown sources" in Android settings
          3. Install the APK
          4. Follow the in-app setup instructions
          
          ### Requirements
          - Android 11+ (API 30+)
          - ARM64 device
          - At least 4GB RAM recommended
          
          ### Changes
          See commit history for detailed changes.
        draft: false
        prerelease: ${{ contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'rc') || github.event.inputs.branch != 'master' }}

    - name: Upload Release APK
      if: ${{ (github.event.inputs.create_github_release == 'true' || github.event_name == 'push') && steps.create_release.outputs.upload_url }}
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: app/build/outputs/apk/release/zomdroid-release-${{ steps.version.outputs.version }}.apk
        asset_name: zomdroid-${{ steps.version.outputs.version }}.apk
        asset_content_type: application/vnd.android.package-archive

    - name: Upload to artifacts (backup)
      uses: actions/upload-artifact@v4
      with:
        name: zomdroid-release-${{ steps.version.outputs.version }}-${{ github.event.inputs.branch || github.ref_name }}
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90
