# Gradle properties for GitHub Actions CI
# This file optimizes Gradle for CI environments

# JVM settings for CI
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8 -XX:+UseParallelGC -XX:MaxMetaspaceSize=1g

# Gradle daemon configuration for CI
org.gradle.daemon=false
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=false

# Android-specific settings
android.useAndroidX=true
android.nonTransitiveRClass=true
android.enableJetifier=false

# Kotlin settings
kotlin.code.style=official
kotlin.incremental=true
kotlin.incremental.android=true

# Build performance
org.gradle.unsafe.configuration-cache=false
org.gradle.unsafe.configuration-cache-problems=warn

# Android build cache
android.enableBuildCache=true

# R8/Proguard settings
android.enableR8.fullMode=true

# Disable unnecessary features for CI
android.enableBuildScriptClasspathCheck=false
android.builder.sdkDownload=false

# NDK settings
android.ndkVersion=28.0.13004108
